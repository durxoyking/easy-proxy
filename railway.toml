[build]
builder = "NIXPACKS"
buildCommand = "composer install --no-dev --optimize-autoloader && if [ -f package-lock.json ]; then npm ci --include=dev; else npm install --include=dev; fi && npm run build && php artisan filament:assets"

[deploy]
startCommand = "php artisan serve --host=0.0.0.0 --port=${PORT}"
preDeployCommand = "php artisan optimize:clear && (php artisan migrate --force || true) && (php artisan storage:link || true) && php artisan config:cache && php artisan route:cache && php artisan view:cache"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
