[build]
builder = "NIXPACKS"
buildCommand = "composer install --no-dev --optimize-autoloader && npm install --include=dev && npm run build && (php artisan filament:upgrade || php artisan filament:assets || true)"

[deploy]
startCommand = "php artisan serve --host=0.0.0.0 --port=${PORT}"
preDeployCommand = "php artisan optimize:clear && (php artisan migrate --force || true) && (php artisan storage:link || true) && php artisan config:cache && php artisan route:cache && php artisan view:cache"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
