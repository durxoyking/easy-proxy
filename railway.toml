[build]
builder = "NIXPACKS"
buildCommand = "composer install --no-dev --optimize-autoloader && npm install && npm run build"

[deploy]
startCommand = "php artisan serve --host=0.0.0.0 --port=$PORT"
preDeployCommand = "php artisan migrate --force || true && php artisan storage:link || true && php artisan optimize:clear && php artisan config:cache && php artisan route:cache && php artisan view:cache"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
